<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Watch Party Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🎬 Watch Party</h1>

    <div class="controls-card">
      <input id="videoUrl" placeholder="Entrez l'URL de la vidéo MP4..." />
      <div class="buttons">
        <button id="hostBtn" class="btn-primary">▶️ Devenir Hôte</button>
        <button id="joinBtn" class="btn-secondary">👥 Rejoindre</button>
        <button id="syncBtn" class="btn-outline">🔄 Resync</button>
      </div>
    </div>

    <div class="status-badge" id="status">En attente d'une action...</div>

    <div class="video-wrapper">
      <video
        id="video"
        controls
        playsinline
        webkit-playsinline
      ></video>
    </div>
  </div>

  <script type="module" src="script.js"></script>

</body>
</html>
